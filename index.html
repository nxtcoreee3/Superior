<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Superior | Home</title>
    <style>
        :root { --apple-blue: #0071e3; --bg: #f5f5f7; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: white; text-align: center; }
        
        .nav { height: 48px; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); position: sticky; top: 0; display: flex; justify-content: center; align-items: center; gap: 30px; border-bottom: 1px solid #d2d2d7; z-index: 1000; }
        .nav a { text-decoration: none; color: #1d1d1f; font-size: 12px; }

        .hero { padding: 100px 20px; }
        .hero h1 { font-size: 56px; font-weight: 600; }
        
        .lineup { display: flex; justify-content: center; gap: 40px; padding: 50px; max-width: 1200px; margin: 0 auto; }
        .product-card { background: var(--bg); border-radius: 30px; padding: 40px; flex: 1; transition: transform 0.3s; }
        .product-card:hover { transform: scale(1.02); }
        .product-card img { width: 100%; max-width: 300px; margin: 20px 0; }
        
        .btn { background: var(--apple-blue); color: white; padding: 12px 24px; border-radius: 980px; text-decoration: none; display: inline-block; margin-top: 20px; font-weight: 500; }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="index.html"><b>Superior</b></a>
        <a href="buy-flagship.html">SuperPhone 1</a>
        <a href="buy-budget.html">SuperPhone 1a</a>
    </nav>

    <div class="hero">
        <h1>Which Superior is right for you?</h1>
    </div>

    <div class="lineup">
        <div class="product-card">
            <h2>SuperPhone 1</h2>
            <p>The ultimate powerhouse.</p>
            <img src="assets/Hero.png" alt="Flagship">
            <div><a href="buy-flagship.html" class="btn">Buy</a></div>
        </div>
        <div class="product-card">
            <h2>SuperPhone 1a</h2>
            <p>Incredible power. Entry price.</p>
            <img src="assets/SuperPhone 1a White.png" alt="Budget">
            <div><a href="buy-budget.html" class="btn">Buy</a></div>
        </div>
    </div>
</body>
</html>
